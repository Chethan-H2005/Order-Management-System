<!DOCTYPE html>
<html>
<body>

<h1>Orders List</h1>

<table border="1">
<tr>
<th>ID</th>
<th>Customer Name</th>
<th>Product</th>
<th>Quantity</th>
<th>Action</th>
</tr>

{% for order in orders %}
<tr>
<td>{{ order[0] }}</td>
<td>{{ order[1] }}</td>
<td>{{ order[2] }}</td>
<td>{{ order[3] }}</td>
<td><a href="/delete/{{ order[0] }}">Delete</a></td>
</tr>
{% endfor %}

</table>

<br>
<a href="/">Go Back</a>

</body>
</html>
